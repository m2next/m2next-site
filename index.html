    <style>
      :root {
        --bg-dark: #0d0d0f;
        --accent: #aa0d01;
        --accent-glow: rgba(170, 13, 1, 0.4);
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.07);
        --text-main: #f0f0f2;
        --text-dim: #949499;
        --transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
      }

      body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Эффект шума на весь экран */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('images/noise.png');
        opacity: 0.15;
        pointer-events: none;
        z-index: 50;
      }

      /* --- HERO SECTION --- */

      .hero {
        height: 100vh;
        display: flex;
        align-items: center;
        padding: 0 10%;
        position: relative;
        overflow: hidden;
        background-size: cover;
        background-position: center;
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        z-index: 1;
        background-color: var(--bg-dark);
      }

      :root {
        --bg-img: url('images/bg1.jpg'); /* Начальное значение */
      }

      /* Создаем два слоя для плавного перехода */
      .hero-bg::before,
      .hero-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        background-image:
          linear-gradient(to right, var(--bg-dark) 20%, transparent 80%),
          linear-gradient(to top, var(--bg-dark), transparent 40%),
          var(--bg-img);
        transition: opacity 2s ease-in-out;
      }

      /* Слой 'after' будет плавно появляться поверх 'before' */
      .hero-bg::after {
        background-image:
          linear-gradient(to right, var(--bg-dark) 20%, transparent 80%),
          linear-gradient(to top, var(--bg-dark), transparent 40%),
          var(--bg-next-img);
        opacity: 0;
      }

      .hero-bg.is-changing::after {
        opacity: 1;
      }

      .hero-content {
        max-width: 800px;
        z-index: 2;
        user-select: none;
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        padding: 8px 16px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-left: 3px solid var(--accent);
        font-family: 'Space Mono', monospace;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 25px;
      }

      .hero-content p {
        font-size: 1.1rem;
        color: var(--text-dim);
        max-width: 550px;
        margin-bottom: 45px;
        line-height: 1.6;
      }

      /* --- BUTTONS --- */
      .btn-group {
        display: flex;
        gap: 20px;
      }

      .btn {
        padding: 18px 22px;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-decoration: none;
        transition: var(--transition);
        position: relative;
        -webkit-user-drag: none;
      }

      .btn-main {
        border: 1px solid transparent;
        background: var(--accent);
        color: white;
        box-shadow: 0 10px 30px var(--accent-glow);
      }

      .btn-main:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px var(--accent-glow);
        background: #cc1002;
      }

      .btn-outline {
        border: 1px solid var(--glass-border);
        color: white;
        background: var(--glass);
        backdrop-filter: blur(5px);
      }

      .btn-outline:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: white;
      }

      /* --- FOOTER --- */
      footer {
        text-align: center;
        position: fixed;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1;
      }

      .footer-logo {
        font-family: 'Cinzel', serif;
        font-size: 2rem;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      .logo-wrapper {
        width: clamp(12rem, 26vw, 22.5rem);
        height: auto;
        margin-top: 10px;
        margin-bottom: 30px;
      }

      .logo {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 768px) {
        .hero {
          height: 100%;
          overflow: auto;
          padding: 10% 10%;
        }

        .hero p {
          backdrop-filter: blur(15px);
          color: white;
          padding: 2% 0;
        }

        .logo-wrapper {
          margin-bottom: 15px;
        }

        .btn-group {
          flex-direction: column;
        }
      }

      footer .copyright {
        font-size: 0.7rem;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        opacity: 0.5;
        user-select: none;
      }
    </style>

  <body>

    <script>
      (function () {
        document.addEventListener('contextmenu', (event) =>
          event.preventDefault(),
        );

        document.addEventListener('copy', (event) => event.preventDefault());

        document.onkeydown = function (e) {
          if (
            e.keyCode == 123 ||
            (e.ctrlKey &&
              e.shiftKey &&
              (e.keyCode == 'I'.charCodeAt(0) ||
                e.keyCode == 'J'.charCodeAt(0))) ||
            (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))
          ) {
            return false;
          }
        };

        document.querySelector('.hero-badge').textContent =
          `Статус на ${new Date().toLocaleDateString('ru-RU')}: в разработке`;

        let img = 0;
        const images = [
          'images/bg1.jpg',
          'images/bg2.jpg',
          'images/bg3.jpg',
          'images/bg4.jpg',
          'images/bg5.jpg',
        ];

        function changeButton() {
          const buttons = [...document.querySelector('.social').children];
          const currentIndex = buttons.findIndex((btn) =>
            btn.classList.contains('btn-main'),
          );
          const nextIndex = (currentIndex + 1) % buttons.length;

          buttons.forEach((btn, i) => {
            if (i === nextIndex) {
              btn.classList.replace('btn-outline', 'btn-main');
              btn.classList.add('btn-main'); // На случай, если классов не было
            } else {
              btn.classList.replace('btn-main', 'btn-outline');
              btn.classList.add('btn-outline');
            }
          });
        }

        function changeBg() {
          const heroBg = document.querySelector('.hero-bg');

          if (heroBg.classList.contains('is-changing')) return;

          const nextImgIndex = (img + 1) % images.length;

          heroBg.style.setProperty('--bg-img', `url(${images[img]})`);
          heroBg.style.setProperty(
            '--bg-next-img',
            `url(${images[nextImgIndex]})`,
          );

          heroBg.classList.add('is-changing');

          setTimeout(() => {
            img = nextImgIndex;
            heroBg.style.setProperty('--bg-img', `url(${images[img]})`);
            heroBg.classList.remove('is-changing');
          }, 2000); // Время должно совпадать с transition в CSS
        }

        const interval = setInterval(() => {
          changeBg();
          changeButton();
        }, 6000);
      })();
    </script>
